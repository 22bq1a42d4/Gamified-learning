{% extends "base_auth.html" %}
{% block title %}Message Student{% endblock %}

{% block content %}
<div class="p-10 bg-white rounded-3xl shadow max-w-xl">
    <h2 class="text-2xl font-black mb-6">Message {{ student.email }}</h2>

    <form method="post">
        {% csrf_token %}
        <textarea name="message"
                  required
                  class="w-full border rounded-xl p-4 mb-4"
                  placeholder="Type your message here..."></textarea>

        <button type="submit"
                class="px-6 py-3 bg-[var(--primary)] text-white rounded-xl font-bold">
            Send Message
        </button>
    </form>
</div>
{% endblock %}
