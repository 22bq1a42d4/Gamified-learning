{% extends "base_public.html" %}
{% load static %}

{% block title %}Reset Password | RuralEdu Quest{% endblock %}

{% block content %}
<style>
    /* Full Page Centering Logic */
    .auth-page-container {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    /* Glassmorphism Card Style */
    .glass-auth-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(20px) saturate(180%);
        border: 2px solid #ffffff;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        border-radius: 40px;
        width: 100%;
        max-width: 480px;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-auth-card:hover {
        transform: translateY(-8px);
    }

    /* Icon Styling for Password Security */
    .icon-box {
        background: linear-gradient(135deg, #4C6EF5 0%, #FFA502 100%);
        width: 80px;
        height: 80px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        box-shadow: 0 10px 20px rgba(76, 110, 245, 0.2);
    }

    /* Input Styling */
    .fancy-input {
        background: #F8F9FA;
        border: 2px solid transparent;
        padding: 1.1rem 1.5rem;
        border-radius: 20px;
        width: 100%;
        transition: all 0.3s ease;
        outline: none;
        font-weight: 500;
    }

    .fancy-input:focus {
        background: #ffffff;
        border-color: #2E8B57;
        box-shadow: 0 0 15px rgba(46, 139, 87, 0.1);
    }

    .input-label {
        font-size: 11px;
        font-weight: 800;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-bottom: 0.75rem;
        display: block;
        padding-left: 0.5rem;
    }

    /* Submit Button Styling */
    .btn-reset {
        background: #2E8B57;
        color: white;
        width: 100%;
        padding: 1.2rem;
        border-radius: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
        margin-top: 1.5rem;
    }

    .btn-reset:hover {
        background: #1e5c3a;
        box-shadow: 0 10px 20px rgba(46, 139, 87, 0.3);
        transform: scale(1.02);
    }
</style>

<div class="auth-page-container mesh-gradient">
    <div class="glass-auth-card p-10 md:p-14 animate-in fade-in zoom-in duration-500">
        
        <div class="text-center">
            <div class="icon-box">
                <i class="fa-solid fa-key-skeleton text-white text-3xl"></i>
            </div>
            <h2 class="heading-font text-4xl font-bold text-gray-900 mb-2">Reset Password</h2>
            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-10">Recover Your Quest Access</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_email" class="input-label">Institutional Email</label>
                <input type="email" name="email" id="id_email" required 
                       class="fancy-input" placeholder="name@school.com" autocomplete="email">
                {% if form.email.errors %}
                    <p class="text-red-500 text-xs mt-2 font-bold">{{ form.email.errors.0 }}</p>
                {% endif %}
            </div>

            <button type="submit" class="btn-reset">
                Send Reset Link <i class="fa-solid fa-paper-plane-top"></i>
            </button>

            <div class="text-center mt-8">
                <a href="{% url 'accounts:login' %}" class="text-sm font-bold text-gray-400 hover:text-[var(--primary)] transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
